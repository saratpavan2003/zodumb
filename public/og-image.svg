<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="50%" stop-color="#9d5ff5"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow1)"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="200" cy="120" r="1" fill="white" opacity="0.3"/>
  <circle cx="350" cy="50" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="500" cy="90" r="1" fill="white" opacity="0.25"/>
  <circle cx="700" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="900" cy="100" r="1" fill="white" opacity="0.3"/>
  <circle cx="1050" cy="60" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="1150" cy="130" r="1" fill="white" opacity="0.25"/>
  <circle cx="150" cy="500" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="400" cy="560" r="1" fill="white" opacity="0.25"/>
  <circle cx="800" cy="580" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="1100" cy="520" r="1" fill="white" opacity="0.3"/>
  <circle cx="950" cy="480" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="250" cy="400" r="2" fill="#f0b429" opacity="0.2"/>

  <!-- Top eyebrow -->
  <text x="600" y="200" font-family="Georgia, sans-serif" font-size="22" font-weight="500" letter-spacing="12" fill="#7c3aed" text-anchor="middle" opacity="0.9">THE COSMOS ARE JUDGING YOU</text>

  <!-- Main title -->
  <text x="600" y="360" font-family="Georgia, serif" font-size="180" font-weight="bold" font-style="italic" fill="url(#title-grad)" text-anchor="middle" letter-spacing="-4">ZODUMB</text>

  <!-- Divider -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="450" font-family="Georgia, sans-serif" font-size="28" font-weight="300" fill="#7a7890" text-anchor="middle">Enter your birthday. Receive your fate. Chaos guaranteed.</text>

  <!-- URL -->
  <text x="600" y="560" font-family="Georgia, sans-serif" font-size="22" fill="#3a3a52" text-anchor="middle" letter-spacing="2">zodumb.com</text>
</svg>
